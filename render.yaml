services:
  - type: web
    name: asset-tracking-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash run.sh
    plan: free
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
