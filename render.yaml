services:
  - type: postgresql
    name: webapp-db
    ipAddress: private
    databaseName: asset_tracking_db
    user: webapp_user

builds:
  - type: web
    dir: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn webapp.wsgi

envVars:
  - key: DATABASE_URL
    fromDatabase:
      name: webapp-db
      property: connectionString
  - key: SECRET_KEY
    generateValue: true
  - key: DEBUG
    value: "False"
