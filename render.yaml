services:
  - type: web
    name: asset-tracking-system
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webapp.wsgi:application
    envVars:
      - key: DATABASE_URL
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
    releaseCommand: python manage.py migrate && python manage.py create_demo_users