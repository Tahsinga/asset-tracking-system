<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Check System - Login</title>
    <style>
        :root {
            --bg-1: #020617;
            --bg-2: #0b1220;
            --card: rgba(2, 6, 23, .75);
            --card-light: rgba(255,255,255,.03);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #22c55e;
            --danger: #ef4444;
            --warn: #facc15;
            --border: rgba(255,255,255,.08);
            --blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif;
        }
        
        body {
            color: var(--text);
            background:
                radial-gradient(1200px 600px at -20% -20%, #1e293b33, transparent),
                radial-gradient(900px 500px at 120% 0%, #4ade8033, transparent),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            background: linear-gradient(145deg, rgba(255,255,255,.04), rgba(255,255,255,0));
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 16px 40px rgba(0,0,0,.35);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: var(--accent);
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .login-header p {
            color: var(--muted);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255,255,255,.03);
            color: var(--text);
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(34,197,94,.1);
            box-shadow: 0 0 0 3px rgba(34,197,94,.15);
        }
        
        .error-message {
            background-color: rgba(239,68,68,.15);
            color: #fca5a5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--danger);
            font-size: 14px;
        }
        
        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, #16a34a 100%);
            color: #020617;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(34,197,94,.35);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--muted);
        }
        
        .role-info {
            background: rgba(34,197,94,.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            font-size: 13px;
            color: var(--text);
        }
        
        .role-info strong {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
        }
        
        .role-info p {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Device Checkout System</h1>
        </div>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
        
        <div class="role-info">
            <strong>Demo Accounts:</strong>
            <p><strong>User:</strong> user1 / password</p>
            <p><strong>Admin:</strong> admin1 / password</p>
            <p><strong>Guard:</strong> guard1 / password</p>
        </div>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="role">Select Role</label>
                <select id="role" name="role" required>
                    <option value="" disabled {% if not selected_role %}selected{% endif %}>Choose role</option>
                    <option value="USER" {% if selected_role == 'USER' %}selected{% endif %}>User</option>
                    <option value="ADMIN" {% if selected_role == 'ADMIN' %}selected{% endif %}>Admin</option>
                    <option value="GATE_GUARD" {% if selected_role == 'GATE_GUARD' %}selected{% endif %}>Gate Guard</option>
                </select>
            </div>
            
            <button type="submit" class="login-button">Login</button>
        </form>
        
        <div class="info-text">
            <p>Select your role below before logging in</p>
        </div>
    </div>
</body>
</html>
