<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Checkout History - Gate Asset Receiver Monitor</title>

  <!-- Modern clean visual style -->
  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0b1220;
      --card: rgba(2, 6, 23, .75);
      --card-light: rgba(255,255,255,.03);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
      --warn: #facc15;
      --border: rgba(255,255,255,.08);
      --blur: blur(12px);
    }

    * { box-sizing: border-box; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at -20% -20%, #1e293b33, transparent),
        radial-gradient(900px 500px at 120% 0%, #4ade8033, transparent),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 24px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 14px; color: var(--muted); }

    .back-btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255,255,255,.02);
      cursor: pointer;
      transition: .2s ease;
      text-decoration: none;
      font-size: 14px;
    }

    .back-btn:hover { background: rgba(255,255,255,.05); }

    .card {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(145deg, var(--card-light), rgba(255,255,255,0));
      backdrop-filter: var(--blur);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-input {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,.02);
      color: var(--text);
      font-size: 14px;
      min-width: 200px;
    }

    .filter-select {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,.02);
      color: var(--text);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.18);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: rgba(255,255,255,.05);
    }

    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    th {
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: rgba(255,255,255,.02);
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .status-active {
      background: rgba(34,197,94,.15);
      color: #4ade80;
    }

    .status-completed {
      background: rgba(239,68,68,.15);
      color: #f87171;
    }

    .mono {
      font-family: ui-monospace, Menlo, Consolas, "Courier New", monospace;
    }

    @media (max-width: 768px) {
      .filters {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-input, .filter-select {
        min-width: auto;
        width: 100%;
      }

      th, td {
        padding: 8px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div>
      <div class="title">Device Checkout History</div>
      <div class="subtitle">Track device checkouts and returns</div>
    </div>
    <a href="/" class="back-btn">← Back to Monitor</a>
  </div>

  <div class="card">
    <div class="filters">
      <input type="text" id="searchInput" class="filter-input" placeholder="Search by device ID, user, department, or purpose...">
      <select id="statusFilter" class="filter-select">
        <option value="all">All Status</option>
        <option value="active">Active Checkouts</option>
        <option value="completed">Completed Checkouts</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Device ID</th>
            <th>User Name</th>
            <th>Contact</th>
            <th>Department</th>
            <th>Checkout Time</th>
            <th>Checkin Time</th>
            <th>Status</th>
            <th>Purpose</th>
          </tr>
        </thead>
        <tbody id="checkoutTableBody">
          <tr>
            <td colspan="8" style="text-align: center; color: var(--muted);">Loading checkout history...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function loadCheckoutHistory() {
      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('statusFilter').value;

      let url = '/checkout-history-data/';
      const params = new URLSearchParams();
      if (search) params.append('search', search);
      if (status !== 'all') params.append('status', status);
      if (params.toString()) url += '?' + params.toString();

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const tbody = document.getElementById('checkoutTableBody');
          tbody.innerHTML = '';

          if (!data.checkouts.length) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: var(--muted);">No checkout records found</td></tr>';
            return;
          }

          data.checkouts.forEach(checkout => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="mono">${checkout.device_id}</td>
              <td>${checkout.user_name}</td>
              <td>${checkout.user_contact || '-'}</td>
              <td>${checkout.user_department || '-'}</td>
              <td>${checkout.checkout_time}</td>
              <td>${checkout.checkin_time || '-'}</td>
              <td>
                <span class="status-badge ${checkout.is_active ? 'status-active' : 'status-completed'}">
                  ${checkout.is_active ? 'Active' : 'Completed'}
                </span>
              </td>
              <td>${checkout.purpose || '-'}</td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(error => {
          console.error('Error loading checkout history:', error);
          document.getElementById('checkoutTableBody').innerHTML =
            '<tr><td colspan="8" style="text-align: center; color: var(--muted);">Error loading data</td></tr>';
        });
    }

    // Load data on page load
    loadCheckoutHistory();

    // Add event listeners with debouncing for search
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(loadCheckoutHistory, 300);
    });

    document.getElementById('statusFilter').addEventListener('change', loadCheckoutHistory);
  </script>

</body>
</html>
