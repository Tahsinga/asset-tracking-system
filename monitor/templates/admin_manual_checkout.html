<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Device Checkout - Admin Panel</title>
    <style>
        :root {
            --bg-1: #020617;
            --bg-2: #0b1220;
            --card: rgba(2, 6, 23, .75);
            --card-light: rgba(255,255,255,.03);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #22c55e;
            --danger: #ef4444;
            --warn: #facc15;
            --border: rgba(255,255,255,.08);
            --blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif;
        }
        
        body {
            color: var(--text);
            background:
                radial-gradient(1200px 600px at -20% -20%, #1e293b33, transparent),
                radial-gradient(900px 500px at 120% 0%, #4ade8033, transparent),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
        }
        
        header {
            backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0));
            color: white;
            padding: 20px 26px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .header-actions a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 500;
        }
        
        .header-actions a:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        
        .card {
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            background: linear-gradient(145deg, var(--card-light), rgba(255,255,255,0));
            backdrop-filter: var(--blur);
            box-shadow: 0 16px 40px rgba(0,0,0,.35);
        }
        
        .card h2 {
            color: var(--text);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            font-size: 16px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            background: rgba(255,255,255,.03);
            color: var(--text);
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(34,197,94,.1);
        }
        
        .form-group select option {
            background: #020617;
            color: var(--text);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkout-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #16a34a 100%);
            color: #020617;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(34,197,94,.35);
        }
        
        .error {
            background-color: rgba(239,68,68,.15);
            color: #fca5a5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--danger);
        }
        
        .success {
            background-color: rgba(34,197,94,.15);
            color: #4ade80;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(34,197,94,.3);
        }
        
        .device-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 4px;
            margin-top: 15px;
        }
        
        .device-row {
            padding: 12px;
            background: rgba(255,255,255,.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .device-row:hover {
            background: rgba(255,255,255,.06);
            border-color: var(--accent);
        }
        
        .device-row strong {
            color: var(--accent);
            font-weight: 600;
        }
        
        .device-row small {
            color: var(--muted);
            font-size: 11px;
        }
        
        .device-row:last-child {
            margin-bottom: 0;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(34,197,94,.2);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,.3);
        }
        
        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }
        
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Hidden CSRF token for JavaScript fetch requests -->
    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
    
    <header>
        <h1>Manual Device Checkout</h1>
        <div class="header-actions">
            <span>Welcome, {{ user.get_full_name|default:user.username }}!</span>
            <a href="{% url 'admin_approvals' %}">Back to Approvals</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </header>
    
    <div class="container">
        <div class="checkout-grid">
            <!-- Checkout Form -->
            <div class="card">
                <h2>Check Out Device</h2>
                
                <div id="message"></div>
                
                <form id="checkoutForm">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="serial_number">Device (Serial Number) *</label>
                        <select id="serial_number" name="serial_number" required>
                            <option value="">-- Select a device --</option>
                            {% for device in available_devices %}
                            <option value="{{ device.serial_number }}">{{ device.device_name }} - {{ device.serial_number }}{% if device.device_model %} ({{ device.device_model }}){% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="two-column">
                        <div class="form-group">
                            <label for="user_name">User Name *</label>
                            <input type="text" id="user_name" name="user_name" placeholder="e.g., John Doe" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="user_department">Department *</label>
                            <input type="text" id="user_department" name="user_department" placeholder="e.g., Engineering" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="user_contact">Contact (Email/Phone) *</label>
                        <input type="text" id="user_contact" name="user_contact" placeholder="e.g., john@example.com or +1234567890" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="purpose">Purpose of Checkout</label>
                        <textarea id="purpose" name="purpose" placeholder="Describe the reason for checkout..."></textarea>
                    </div>
                    
                    <button type="submit" class="checkout-btn">Check Out Device Immediately</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        const csrftoken = document.querySelector('input[name="csrfmiddlewaretoken"]').value;
        
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const serialNumber = document.getElementById('serial_number').value;
            const userName = document.getElementById('user_name').value;
            const userDepartment = document.getElementById('user_department').value;
            const userContact = document.getElementById('user_contact').value;
            const purpose = document.getElementById('purpose').value;
            const messageEl = document.getElementById('message');
            
            if (!serialNumber) {
                messageEl.innerHTML = '<div class="error">Please select a device</div>';
                return;
            }
            
            try {
                const response = await fetch('{% url "admin_manual_checkout" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify({
                        serial_number: serialNumber,
                        user_name: userName,
                        user_contact: userContact,
                        user_department: userDepartment,
                        purpose: purpose
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    messageEl.innerHTML = '<div class="success">✓ Device checked out successfully! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = '{% url "admin_approvals" %}';
                    }, 1500);
                } else {
                    messageEl.innerHTML = `<div class="error">✗ Error: ${data.message}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                messageEl.innerHTML = '<div class="error">✗ An error occurred. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
